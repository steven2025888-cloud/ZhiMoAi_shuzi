[log]
log_dir = ./
log_file = dh.log

[http_server]
server_ip = 0.0.0.0
server_port = 8383

[temp]
temp_dir = ./temp
clean_switch = 1

[result]
result_dir = ./result
clean_switch = 0

[digital]
batch_size = 8
# 是否启用 GFPGAN 面部超分（1=启用, 0=关闭）。关闭后合成速度大幅提升（~5倍）
enable_gfpgan = 0

[register]
url = http://172.16.160.51:12120
report_interval = 10
enable=0

[server]
# 最大并发合成任务数（超出排队）
max_concurrent = 3
# 上传文件存放目录
upload_dir = ./uploads
# 合成结果存放目录
output_dir = ./outputs
# 自动清理：文件保留时长（秒），86400 = 1天
file_ttl_seconds = 86400
# 自动清理：检查间隔（秒）
cleanup_interval_seconds = 3600
# API 鉴权密钥（留空则不校验）
api_secret =
# WebSocket API 地址（连接到 API 端的 WebSocket 网关）
# 例如: ws://api.example.com:9501/dsp
# 留空则不启用 WebSocket 客户端
ws_api_url = wss://api.zhimengai.xyz/dsp
